site_name: sstar
site_url: "https://xin-huang.github.io/sstar"
repo_url: "https://github.com/xin-huang/sstar"
edit_uri: ""
docs_dir: 'docs'
theme:
  name: "material"
  features:
    - content.code.copy
  palette:
    primary: cyan
    accent: cyan
plugins:
  - search
markdown_extensions:
  - extra
  - tables
  - fenced_code
  - admonition
  - codehilite
extra_javascript:
  - 'https://cdn.mathjax.org/mathjax/latest/MathJax.js?config=TeX-AMS_HTML'
nav:
- Home: 'index.md'
- User Guide: 
    - Overview: 'userguide/overview.md'
    - Calculate S* scores: 'userguide/score.md'
    - Calculate quantiles of expected S*: 'userguide/quantile.md'
    - Calculate significant S* score thresholds: 'userguide/threshold.md'
    - Calculate source match rates: 'userguide/matchrate.md'
    - Get candidate introgressed fragments: 'userguide/tract.md'
